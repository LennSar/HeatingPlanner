name: heating_planner
description: "Cross-platform floor and wall heating system planning application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  file_picker: ^8.1.2
  fl_chart: ^1.0.0
  pdf: ^3.11.0
  vector_math: ^2.1.0
  uuid: ^4.4.0
  archive: ^4.0.0
  collection: ^1.18.0
  logging: ^1.2.0
  path: ^1.9.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  drift_dev: ^2.18.0
  riverpod_generator: ^4.0.0
  mockito: ^5.4.0
  flutter_lints: ^4.0.0
  fake_async: ^1.3.0
  shared_preferences_platform_interface: ^2.4.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/materials.json
